<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ReviewPositive | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');
        :root { --neon: #bc13fe; }
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(188, 19, 254, 0.6); font-family: 'Orbitron'; }
        .glass { background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(188, 19, 254, 0.2); border-radius: 12px; }
        .input-q { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .btn-p { background: linear-gradient(135deg, #bc13fe, #6a0dad); padding: 12px; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; color: white; width: 100%; border: none; cursor: pointer; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.9); border-right: 1px solid #1a1a1a; z-index: 100; display: flex; flex-direction: column; }
        .main { margin-left: 260px; padding: 30px; padding-bottom: 120px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding-bottom: 140px; } .mobile-nav { display: grid; grid-template-columns: repeat(5, 1fr); position: fixed; bottom: 0; width: 100%; background: #000; height: 85px; border-top: 2px solid var(--neon); z-index: 1000; } }
        .nav-item-m { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; color: #555; }
        .nav-item-m.active { color: white; text-shadow: 0 0 10px var(--neon); }
        .view { display: none; } .view.active { display: block; }
        .tab-btn { padding: 8px 12px; font-size: 9px; font-weight: bold; border-radius: 5px; background: #111; color: #666; transition: 0.3s; }
        .tab-btn.active { background: var(--neon); color: white; }
    </style>
</head>
<body>

<div id="auth-gate" class="flex items-center justify-center min-h-screen p-6 relative z-10">
    <div class="glass p-8 w-full max-w-[360px] text-center shadow-2xl border-t-2 border-[#bc13fe]">
        <h1 class="neon-text text-2xl mb-6 italic font-black">REVIEWPOSITIVE</h1>
        
        <div id="login-box" class="space-y-4">
            <input type="email" id="l-email" placeholder="Correo" class="input-q">
            <input type="password" id="l-pass" placeholder="Contraseña" class="input-q">
            <button onclick="loginEmail()" class="btn-p">ENTRAR</button>
            <p class="text-[10px] mt-4 text-gray-400">¿No tienes cuenta? <span onclick="toggleAuth(true)" class="underline cursor-pointer text-white">Regístrate</span></p>
        </div>

        <div id="reg-box" class="space-y-4 hidden">
            <input type="text" id="r-nick" placeholder="Apodo" class="input-q">
            <input type="email" id="r-email" placeholder="Correo" class="input-q">
            <input type="password" id="r-pass" placeholder="Contraseña" class="input-q">
            <input type="text" id="r-ref" placeholder="Código de Referido (Opcional)" class="input-q">
            <button onclick="register()" class="btn-p">CREAR CUENTA</button>
            <p class="text-[10px] mt-4 text-gray-400">¿Ya tienes cuenta? <span onclick="toggleAuth(false)" class="underline cursor-pointer text-white">Inicia Sesión</span></p>
        </div>
    </div>
</div>

<div id="app-panel" class="hidden relative z-10">
    <aside class="sidebar p-6">
        <div class="neon-text text-xl font-black mb-10 italic">REVIEWPOSITIVE</div>
        <nav class="space-y-4 flex-grow font-bold text-gray-400 text-sm">
            <div onclick="nav('v-dash')" class="hover:text-white cursor-pointer">🏠 DASHBOARD</div>
            <div onclick="nav('v-tasks')" class="hover:text-white cursor-pointer">📋 TAREAS</div>
            <div onclick="nav('v-history')" class="hover:text-white cursor-pointer">📜 HISTORIAL</div>
            <div onclick="nav('v-refs')" class="hover:text-white cursor-pointer">👥 REFERIDOS</div>
            <div onclick="nav('v-wallet')" class="hover:text-white cursor-pointer">💰 CAJERO</div>
        </nav>
        <button onclick="logout()" class="text-red-500 text-[10px] font-bold">CERRAR SESIÓN</button>
    </aside>

    <nav id="mb-nav" class="mobile-nav md:hidden">
        <div onclick="nav('v-dash')" class="nav-item-m active">🏠</div>
        <div onclick="nav('v-tasks')" class="nav-item-m">📋</div>
        <div onclick="nav('v-history')" class="nav-item-m">📜</div>
        <div onclick="nav('v-refs')" class="nav-item-m">👥</div>
        <div onclick="nav('v-wallet')" class="nav-item-m">💰</div>
    </nav>

    <main class="main">
        <div id="v-dash" class="view active">
            <h1 class="text-3xl font-black mb-8 uppercase italic text-white" id="u-nick">...</h1>
            <div class="glass p-8 max-w-sm border-t-4 border-purple-600">
                <p class="text-[10px] uppercase font-bold text-gray-400">Saldo Disponible</p>
                <div id="u-saldo" class="text-5xl font-black italic text-white">$0.00</div>
            </div>
        </div>

        <div id="v-tasks" class="view">
            <h2 class="font-black mb-6 italic text-xl uppercase text-white border-b border-gray-800 pb-2">TAREAS ACTIVAS</h2>
            <div id="tasks-list" class="space-y-4"></div>
        </div>

        <div id="v-history" class="view">
            <h2 class="font-black mb-6 italic text-xl uppercase text-white border-b border-gray-800 pb-2">HISTORIAL</h2>
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
                <button onclick="filterHistory('pendiente')" class="tab-btn active" id="tab-pendiente">PENDIENTES</button>
                <button onclick="filterHistory('aprobado')" class="tab-btn" id="tab-aprobado">APROBADAS</button>
                <button onclick="filterHistory('rechazado')" class="tab-btn" id="tab-rechazado">RECHAZADAS</button>
            </div>
            <div id="history-content" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="v-refs" class="view">
            <h2 class="font-black mb-6 italic text-xl uppercase text-white border-b border-gray-800 pb-2">REFERIDOS</h2>
            <div class="glass p-6 mb-6">
                <p class="text-xs text-gray-400 uppercase font-bold mb-2">Tu Código:</p>
                <div id="u-ref-code" class="text-2xl font-black text-[#bc13fe] bg-white/5 p-4 rounded-lg text-center">---</div>
            </div>
            <div id="refs-list" class="space-y-2"></div>
        </div>

        <div id="v-wallet" class="view">
            <h2 class="font-black mb-6 italic text-xl uppercase text-white border-b border-gray-800 pb-2">CAJERO</h2>
            <div class="glass p-6 max-w-md space-y-4">
                <input type="number" id="w-amount" placeholder="Monto $" class="input-q">
                <input type="text" id="w-address" placeholder="Datos de pago" class="input-q">
                <button onclick="alert('Solicitud enviada')" class="btn-p">RETIRAR</button>
            </div>
        </div>
    </main>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCl70qqZqSbS3Yb9LAmfysj4U8GrlWnBI0",
      authDomain: "rese-7c285.firebaseapp.com",
      projectId: "rese-7c285",
      storageBucket: "rese-7c285.firebasestorage.app",
      messagingSenderId: "864424736790",
      appId: "1:864424736790:web:93476a4e3f340f01d31d37"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let userData = null;

    // --- AUTENTICACIÓN CORREGIDA ---

    async function loginEmail() {
        const e = document.getElementById('l-email').value.trim();
        const p = document.getElementById('l-pass').value;
        if(!e || !p) return alert("Llena todos los campos");

        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch (error) {
            if (error.code === 'auth/user-not-found') alert("Esta cuenta no existe. ¡Regístrate!");
            else if (error.code === 'auth/wrong-password') alert("Contraseña incorrecta");
            else alert("Error al entrar: " + error.message);
        }
    }

    async function register() {
        const nick = document.getElementById('r-nick').value.trim();
        const email = document.getElementById('r-email').value.trim();
        const pass = document.getElementById('r-pass').value;
        const ref = document.getElementById('r-ref').value.trim();

        if(!nick || !email || !pass) return alert("Completa los datos");

        try {
            // Intentar crear usuario en Auth
            const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
            const user = userCredential.user;

            // Guardar datos en Firestore
            const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection('usuarios').doc(email).set({
                nick: nick,
                email: email,
                saldo: 0,
                refCode: refCode,
                referredBy: ref || null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("¡Cuenta creada con éxito!");
        } catch (error) {
            if (error.code === 'auth/email-already-in-use') alert("¡Ya tienes una cuenta con este correo! Inicia sesión.");
            else alert("Error: " + error.message);
        }
    }

    // --- LÓGICA DE LA APP (SIN BORRAR NADA) ---

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection('usuarios').doc(user.email).onSnapshot(doc => {
                if(doc.exists) {
                    userData = doc.data();
                    document.getElementById('u-nick').innerText = userData.nick.toUpperCase();
                    document.getElementById('u-saldo').innerText = `$${userData.saldo.toFixed(2)}`;
                    document.getElementById('u-ref-code').innerText = userData.refCode;
                    document.getElementById('auth-gate').classList.add('hidden');
                    document.getElementById('app-panel').classList.remove('hidden');
                    loadTasks();
                    filterHistory('pendiente');
                    loadRefs();
                }
            });
        } else {
            document.getElementById('auth-gate').classList.remove('hidden');
            document.getElementById('app-panel').classList.add('hidden');
        }
    });

    function toggleAuth(reg) {
        document.getElementById('login-box').classList.toggle('hidden', reg);
        document.getElementById('reg-box').classList.toggle('hidden', !reg);
    }

    function nav(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
    }

    function loadTasks() {
        db.collection('tareas').where('active', '==', true).onSnapshot(snap => {
            const cont = document.getElementById('tasks-list');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const t = doc.data();
                cont.innerHTML += `<div class="glass p-4 border-l-4 border-purple-500">
                    <p class="text-xs font-black uppercase mb-2">${t.name} - $${t.pay}</p>
                    <input id="url-${doc.id}" placeholder="Link de reseña" class="input-q !p-2 text-[10px] mb-2">
                    <button onclick="sendReview('${doc.id}', '${t.name}', ${t.pay})" class="btn-p !p-2 text-[10px]">ENVIAR A REVISIÓN</button>
                </div>`;
            });
        });
    }

    async function sendReview(tid, tname, tpay) {
        const url = document.getElementById(`url-${tid}`).value.trim();
        if(!url) return alert("Pega el link");
        await db.collection('resenas').add({
            userId: userData.email, taskName: tname, pay: tpay,
            url: url, status: 'pendiente', createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Enviada al historial");
    }

    function filterHistory(status) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+status).classList.add('active');
        db.collection('resenas').where('userId', '==', userData.email).where('status', '==', status).onSnapshot(snap => {
            const cont = document.getElementById('history-content');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                cont.innerHTML += `<div class="glass p-3 text-[10px]"><b>${r.taskName}</b> - $${r.pay}</div>`;
            });
        });
    }

    function loadRefs() {
        db.collection('usuarios').where('referredBy', '==', userData.refCode).onSnapshot(snap => {
            const cont = document.getElementById('refs-list');
            cont.innerHTML = "";
            snap.forEach(doc => {
                cont.innerHTML += `<div class="glass p-3 text-[10px] flex justify-between"><span>${doc.data().nick}</span> <span class="text-green-500">Activo</span></div>`;
            });
        });
    }

    function logout() { auth.signOut(); }
</script>
</body>
</html>
