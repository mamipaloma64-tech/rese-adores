<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReviewPositive | Sistema Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');
        
        :root { --neon: #bc13fe; --gold: #ffcc00; --red: #ff4444; --green: #00ff88; }
        
        /* FONDO DE ESTRELLAS ANIMADO */
        body { 
            background-color: #030305;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; 
            background-size: 250px 250px; 
            animation: starsAnim 100s linear infinite;
            color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; 
        }
        @keyframes starsAnim { from { background-position: 0 0; } to { background-position: -1000px 1000px; } }

        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(188, 19, 254, 0.6); font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(188, 19, 254, 0.2); border-radius: 15px; }
        .input-q { background: rgba(0,0,0,0.8); border: 1px solid rgba(188,19,254,0.3); color: white; padding: 0.9rem; border-radius: 10px; width: 100%; outline: none; transition: 0.3s; }
        .btn-p { background: linear-gradient(135deg, #bc13fe 0%, #6a0dad 100%); padding: 0.9rem; border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; color: white; width: 100%; border: none; cursor: pointer; text-transform: uppercase; }

        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.98); border-right: 1px solid #1a1a1a; z-index: 100; display: flex; flex-direction: column; }
        .main { margin-left: 260px; padding: 30px; }
        
        @media (max-width: 768px) { 
            .sidebar { display: none; } 
            .main { margin-left: 0; padding: 15px; padding-bottom: 100px; } 
            .mobile-nav { display: grid; grid-template-columns: repeat(5, 1fr); position: fixed; bottom: 0; left: 0; width: 100%; background: #000; height: 75px; z-index: 1000; border-top: 2px solid var(--neon); } 
            .nav-item-m { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #555; }
            .nav-item-m.active-m { color: white; }
        }

        .view { display: none; } .view.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .badge-pendiente { background: #555; color: white; }
        .badge-aprobado { background: var(--green); color: black; }
        .badge-rechazado { background: var(--red); color: white; }
    </style>
</head>
<body onload="checkSession()">

<div id="alert-msg" class="fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-black text-xs z-[2000] hidden text-white shadow-xl"></div>

<div id="auth-gate" class="flex items-center justify-center min-h-screen p-6 relative z-10">
    <div class="glass p-8 w-full max-w-[380px] text-center shadow-2xl">
        <h1 class="neon-text text-2xl mb-8 uppercase">ReviewPositive</h1>
        <div id="login-box" class="space-y-4">
            <input type="text" id="l-user" placeholder="Email o Apodo" class="input-q text-center">
            <input type="password" id="l-pass" placeholder="Contraseña" class="input-q text-center">
            <button onclick="login()" class="btn-p w-full shadow-lg shadow-purple-900/50">ENTRAR</button>
            <div class="flex items-center my-6"><hr class="flex-grow border-gray-800"><span class="px-3 text-[10px] text-gray-500 font-bold">O GOOGLE</span><hr class="flex-grow border-gray-800"></div>
            <div id="g_id_onload" data-client_id="599903299957-1u15almgd6dp4bsoq9bcmvk6j4k4loa7.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-theme="filled_black" data-size="large"></div>
            <p class="text-[11px] mt-6 text-gray-400">¿No tienes cuenta? <span onclick="toggleAuth(true)" class="text-white font-bold underline cursor-pointer">Regístrate</span></p>
        </div>
        <div id="reg-box" class="space-y-4 hidden">
            <input type="text" id="r-nick" placeholder="Apodo" class="input-q text-center">
            <input type="email" id="r-email" placeholder="Correo Electrónico" class="input-q text-center">
            <input type="password" id="r-pass" placeholder="Contraseña" class="input-q text-center">
            <input type="text" id="r-ref" placeholder="Código de Referido (Opcional)" class="input-q text-center">
            <button onclick="register()" class="btn-p w-full">CREAR CUENTA</button>
            <p class="text-[11px] mt-6 text-gray-400" onclick="toggleAuth(false)">Volver al Login</p>
        </div>
    </div>
</div>

<div id="app-panel" class="hidden relative z-10">
    <aside class="sidebar p-8">
        <div class="neon-text text-xl mb-10 text-center">DASHBOARD</div>
        <nav class="space-y-4 flex-grow">
            <div class="cursor-pointer font-bold text-gray-300 hover:text-white" onclick="nav('v-dash')">🏠 INICIO</div>
            <div class="cursor-pointer font-bold text-gray-500 hover:text-white" onclick="nav('v-tasks')">📋 TAREAS</div>
            <div class="cursor-pointer font-bold text-gray-500
