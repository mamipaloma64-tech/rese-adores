<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReviewPositive | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');
        :root { --neon: #bc13fe; --gold: #ffcc00; }
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(188, 19, 254, 0.6); font-family: 'Orbitron'; }
        .glass { background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(188, 19, 254, 0.2); border-radius: 12px; }
        .input-q { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; outline: none; }
        .btn-p { background: linear-gradient(135deg, #bc13fe, #6a0dad); padding: 12px; border-radius: 8px; font-weight: 900; font-family: 'Orbitron'; color: white; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid #1a1a1a; z-index: 100; display: flex; flex-direction: column; }
        .main { margin-left: 260px; padding: 30px; }
        @media (max-width: 768px) { 
            .sidebar { display: none; } .main { margin-left: 0; padding-bottom: 100px; }
            .mobile-nav { display: grid; grid-template-columns: repeat(5, 1fr); position: fixed; bottom: 0; width: 100%; background: #000; height: 70px; border-top: 2px solid var(--neon); z-index: 1000; }
            .nav-item-m { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #555; }
            .nav-item-m.active { color: white; }
        }
        .view { display: none; } .view.active { display: block; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .status-pendiente { background: #555; }
        .status-aprobado { background: #00ff88; color: #000; }
    </style>
</head>
<body onload="checkSession()">

<div id="alert-msg" class="fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-black text-xs z-[3000] hidden text-white shadow-xl bg-red-600"></div>

<div id="auth-gate" class="flex items-center justify-center min-h-screen p-6">
    <div class="glass p-8 w-full max-w-[360px] text-center">
        <h1 class="neon-text text-xl mb-6">REVIEWPOSITIVE</h1>
        <div id="login-box" class="space-y-4">
            <input type="text" id="l-user" placeholder="Email o Nick" class="input-q">
            <input type="password" id="l-pass" placeholder="Contraseña" class="input-q">
            <button onclick="login()" class="btn-p">ENTRAR</button>
            <div id="g_id_onload" data-client_id="599903299957-1u15almgd6dp4bsoq9bcmvk6j4k4loa7.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin mt-4 flex justify-center" data-type="standard" data-theme="filled_black"></div>
            <p class="text-[10px] mt-4">¿No tienes cuenta? <span onclick="toggleAuth(true)" class="underline cursor-pointer">Regístrate</span></p>
        </div>
        <div id="reg-box" class="space-y-4 hidden">
            <input type="text" id="r-nick" placeholder="Apodo" class="input-q">
            <input type="email" id="r-email" placeholder="Email" class="input-q">
            <input type="password" id="r-pass" placeholder="Contraseña" class="input-q">
            <input type="text" id="r-ref" placeholder="Código Referido (Opcional)" class="input-q">
            <button onclick="register()" class="btn-p">CREAR CUENTA</button>
            <p class="text-[10px] mt-4" onclick="toggleAuth(false)">Volver al login</p>
        </div>
    </div>
</div>

<div id="app-panel" class="hidden">
    <aside class="sidebar p-6">
        <div class="neon-text text-lg mb-10">RP DASHBOARD</div>
        <nav class="space-y-4 flex-grow font-bold text-gray-400">
            <div onclick="nav('v-dash')" class="hover:text-white cursor-pointer">DASHBOARD</div>
            <div onclick="nav('v-tasks')" class="hover:text-white cursor-pointer">TAREAS</div>
            <div onclick="nav('v-wallet')" class="hover:text-white cursor-pointer">RETIRAR</div>
            <div id="adm-btn" class="hidden text-yellow-500 pt-4 border-t border-white/10 cursor-pointer" onclick="nav('v-admin')">ADMIN CONTROL</div>
        </nav>
        <button onclick="logout()" class="text-red-500 text-[10px] font-bold">CERRAR SESIÓN</button>
    </aside>

    <nav class="mobile-nav md:hidden">
        <div onclick="nav('v-dash')" class="nav-item-m active">🏠</div>
        <div onclick="nav('v-tasks')" class="nav-item-m">📋</div>
        <div onclick="nav('v-wallet')" class="nav-item-m">💰</div>
        <div id="adm-btn-mb" class="hidden nav-item-m text-yellow-500" onclick="nav('v-admin')">⚡</div>
    </nav>

    <main class="main">
        <div id="v-dash" class="view active">
            <h1 class="text-2xl font-black mb-1 uppercase" id="u-nick">...</h1>
            <p class="text-[10px] text-yellow-500 mb-6">REF: <span id="u-ref-code" class="text-white">---</span></p>
            <div class="glass p-6 max-w-sm border-t-2 border-purple-600">
                <p class="text-[9px] uppercase font-bold text-gray-500">Saldo Disponible</p>
                <div id="u-saldo" class="text-4xl font-black">$0.00</div>
            </div>
        </div>

        <div id="v-tasks" class="view">
            <h2 class="font-black mb-4 italic">TAREAS DISPONIBLES</h2>
            <div id="tasks-list" class="space-y-4 mb-10"></div>
            
            <h2 class="font-black mb-4 italic text-gray-500">MI HISTORIAL DE RESEÑAS</h2>
            <div id="my-reviews" class="space-y-2 text-[11px]"></div>
        </div>

        <div id="v-wallet" class="view">
            <div class="glass p-6 max-w-md space-y-4">
                <h2 class="font-black italic">SOLICITAR PAGO</h2>
                <select id="w-method" class="input-q"><option>Bybit Pay</option><option>Binance Pay</option><option>Pago Movil</option></select>
                <input type="text" id="w-address" placeholder="ID o Datos" class="input-q">
                <input type="number" id="w-amount" placeholder="Monto" class="input-q">
                <button onclick="withdraw()" class="btn-p">RETIRAR</button>
            </div>
        </div>

        <div id="v-admin" class="view">
            <div class="flex gap-4 mb-6 text-[10px] font-black overflow-x-auto">
                <button onclick="admS('a-u')" class="bg-purple-900 px-4 py-2 rounded">USUARIOS</button>
                <button onclick="admS('a-r')" class="bg-gray-800 px-4 py-2 rounded">REVISAR</button>
                <button onclick="admS('a-w')" class="bg-gray-800 px-4 py-2 rounded">PAGOS</button>
            </div>
            <div id="a-u" class="adm-sec space-y-2"></div>
            <div id="a-r" class="adm-sec hidden space-y-2"></div>
            <div id="a-w" class="adm-sec hidden space-y-2"></div>
        </div>
    </main>
</div>

<script>
    const MASTER_EMAIL = "nevinarg.2023@gmail.com";
    let db = JSON.parse(localStorage.getItem('RP_DB')) || { users: [], tasks: [], reviews: [], withdraws: [] };
    let currentUser = JSON.parse(localStorage.getItem('RP_SESSION')) || null;

    function save() { localStorage.setItem('RP_DB', JSON.stringify(db)); }
    function msg(t, ok=false) { 
        const e = document.getElementById('alert-msg'); 
        e.innerText = t; e.style.background = ok ? '#00ff88' : '#ff4444';
        e.classList.remove('hidden'); setTimeout(()=>e.classList.add('hidden'), 3000);
    }

    function checkSession() {
        if(currentUser) launch();
    }

    function toggleAuth(reg) { 
        document.getElementById('login-box').classList.toggle('hidden', reg);
        document.getElementById('reg-box').classList.toggle('hidden', !reg);
    }

    function login() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;
        const found = db.users.find(x => (x.email === u || x.nick === u) && x.pass === p);
        if(found) { 
            if(found.banned) return msg("Baneado");
            currentUser = found; 
            localStorage.setItem('RP_SESSION', JSON.stringify(found));
            launch(); 
        } else msg("Error");
    }

    function handleGoogleLogin(res) {
        const payload = JSON.parse(atob(res.credential.split('.')[1]));
        let found = db.users.find(x => x.email === payload.email);
        if(!found) {
            found = { nick: payload.given_name, email: payload.email, pass: 'google', saldo: 0, refCode: 'G'+Math.floor(Math.random()*999), banned: false };
            db.users.push(found); save();
        }
        currentUser = found;
        localStorage.setItem('RP_SESSION', JSON.stringify(found));
        launch();
    }

    function register() {
        const n = document.getElementById('r-nick').value;
        const e = document.getElementById('r-email').value;
        const p = document.getElementById('r-pass').value;
        const r = document.getElementById('r-ref').value;
        if(!n || !e || !p) return msg("Faltan datos");
        if(db.users.find(x => x.email === e)) return msg("Ya existe");
        
        const newUser = { nick: n, email: e, pass: p, saldo: 0, refCode: n.slice(0,3)+Math.floor(Math.random()*99), referredBy: r, banned: false };
        db.users.push(newUser); save();
        msg("Registrado!", true); toggleAuth(false);
    }

    function launch() {
        document.getElementById('auth-gate').classList.add('hidden');
        document.getElementById('app-panel').classList.remove('hidden');
        document.getElementById('u-nick').innerText = currentUser.nick;
        document.getElementById('u-ref-code').innerText = currentUser.refCode;
        if(currentUser.email === MASTER_EMAIL) {
            document.getElementById('adm-btn').classList.remove('hidden');
            document.getElementById('adm-btn-mb').classList.remove('hidden');
        }
        refresh();
    }

    function refresh() {
        // Sincronizar currentUser con el saldo real en DB
        const realU = db.users.find(x => x.email === currentUser.email);
        document.getElementById('u-saldo').innerText = `$${realU.saldo.toFixed(2)}`;
        renderTasks();
        renderMyReviews();
    }

    function nav(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        if(v === 'v-admin') renderAdmin();
    }

    function renderTasks() {
        const cont = document.getElementById('tasks-list');
        cont.innerHTML = db.tasks.length ? '' : '<p class="text-[10px] text-gray-600">No hay tareas</p>';
        db.tasks.forEach(t => {
            if(!db.reviews.find(r => r.taskId === t.id && r.user === currentUser.email)) {
                cont.innerHTML += `<div class="glass p-4 border-l-4 border-purple-500">
                    <div class="flex justify-between font-black text-xs uppercase"><span>${t.name}</span><span class="text-green-400">$${t.pay}</span></div>
                    <div class="flex gap-2 mt-4">
                        <a href="${t.link}" target="_blank" class="bg-white/10 p-2 rounded text-[10px]">MAPS</a>
                        <input id="link-${t.id}" placeholder="Pega Link Reseña" class="input-q !p-2 flex-grow text-[10px]">
                        <button onclick="sendReview('${t.id}')" class="bg-purple-600 p-2 rounded text-[10px] font-bold">OK</button>
                    </div>
                </div>`;
            }
        });
    }

    function renderMyReviews() {
        const cont = document.getElementById('my-reviews');
        const mios = db.reviews.filter(r => r.user === currentUser.email);
        cont.innerHTML = mios.map(r => `
            <div class="bg-white/5 p-2 rounded flex justify-between items-center">
                <span>${r.taskName}</span>
                <span class="status-pill status-${r.status}">${r.status}</span>
            </div>
        `).join('') || 'Sin actividad';
    }

    function sendReview(tid) {
        const l = document.getElementById(`link-${tid}`).value;
        if(!l) return msg("Falta link");
        const task = db.tasks.find(x => x.id == tid);
        db.reviews.push({ id: Date.now(), taskId: tid, taskName: task.name, user: currentUser.email, nick: currentUser.nick, url: l, pay: task.pay, status: 'pendiente' });
        save(); refresh(); msg("Enviada", true);
    }

    function admS(id) { 
        document.querySelectorAll('.adm-sec').forEach(x => x.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function renderAdmin() {
        // Usuarios
        document.getElementById('a-u').innerHTML = db.users.map(u => `
            <div class="glass p-3 flex justify-between text-[10px]">
                <span>${u.nick} (${u.email}) - <b>$${u.saldo.toFixed(2)}</b></span>
                <button onclick="ban('${u.email}')" class="text-red-500">${u.banned ? 'UNBAN' : 'BAN'}</button>
            </div>
        `).join('');
        // Reseñas
        document.getElementById('a-r').innerHTML = db.reviews.filter(r=>r.status==='pendiente').map(r => `
            <div class="glass p-3 text-[10px]">
                ${r.nick} -> ${r.taskName} ($${r.pay})<br>
                <a href="${r.url}" target="_blank" class="text-blue-400">Ver Reseña</a>
                <div class="flex gap-2 mt-2">
                    <button onclick="approve('${r.id}', true)" class="bg-green-600 px-3 py-1 rounded">APROBAR</button>
                    <button onclick="approve('${r.id}', false)" class="bg-red-600 px-3 py-1 rounded">RECHAZAR</button>
                </div>
            </div>
        `).join('');
    }

    function approve(rid, ok) {
        const r = db.reviews.find(x => x.id == rid);
        if(ok) {
            const u = db.users.find(x => x.email === r.user);
            u.saldo += r.pay;
            if(u.referredBy) {
                const boss = db.users.find(x => x.refCode === u.referredBy);
                if(boss) boss.saldo += (r.pay * 0.10);
            }
        }
        r.status = ok ? 'aprobado' : 'rechazado';
        save(); renderAdmin(); refresh();
    }

    function ban(em) {
        if(em === MASTER_EMAIL) return;
        const u = db.users.find(x => x.email === em);
        u.banned = !u.banned; save(); renderAdmin();
    }

    function logout() { 
        localStorage.removeItem('RP_SESSION'); 
        location.reload(); 
    }
</script>
</body>
</html>
